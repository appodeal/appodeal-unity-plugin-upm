name: Prepare Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, e.g. 1.2.3'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install release tools
        run: npm install --no-save release-it@19.2.4 @release-it/conventional-changelog@10.0.6

      - name: Run release-it
        run: npx release-it@19.2.4 ${{ inputs.version }} --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
